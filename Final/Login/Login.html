<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Aijá Gourgel e Zola Bento">
    <link rel="shortcut icon" href="../imagens/image.png" type="image/x-icon">

    <link rel="stylesheet" href="style-login.css">
    
    <title>Itel - Login</title>
</head>


<body>
    <button class="botao-voltar" onclick="history.back()">
    ← Voltar
</button>
        <section class="login-section">
            <div class="login-box">
                <div class="login-header">
                    <img src="../imagens/image.png" alt="Logo ITEL" class="login-logo">
                    <p>Introduza os seus dados para aceder</p>
                </div>

                <form action="#" method="POST" class="login-form">
                    <div class="input-group">
                        <label for="student-id">Número de Processo</label>
                        <input type="text" id="student-id" placeholder="Ex: 15686" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Palavra-passe</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="login-options">
                        <label><input type="checkbox"> Lembrar-me</label>
                    </div>

                    <button type="submit" value="submit" class="btn-login">Entrar no Portal</button>
                </form>

                <div class="login-footer">
                    <p>Não consegue aceder? <a href="#contacto">Contacte a Secretaria</a></p>
                </div>
            </div>
        </section>


</body>
